name: Build and Release

on:
  push:
    branches: [ "main" ]
    tags: [ "v*" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag, for example v2.6.0"
        required: true
        default: "v2.6.0"

permissions:
  contents: read

jobs:
  build:
    name: Build backend and frontend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build backend
        run: |
          chmod +x gradlew
          ./gradlew clean bootJar

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: qweovo-front/package-lock.json

      - name: Build frontend
        working-directory: qweovo-front
        run: |
          npm ci
          npm run build

      - name: Pack release assets
        run: |
          mkdir -p release
          JAR_FILE="$(find build/libs -maxdepth 1 -type f -name '*.jar' ! -name '*plain*' | head -n 1)"
          cp "$JAR_FILE" release/QWEOVOdetect-backend.jar
          cd qweovo-front/dist
          zip -r ../../release/qweovo-front-dist.zip .

      - name: Upload backend artifact
        uses: actions/upload-artifact@v4
        with:
          name: QWEOVOdetect-backend
          path: release/QWEOVOdetect-backend.jar

      - name: Upload frontend artifact
        uses: actions/upload-artifact@v4
        with:
          name: qweovo-front-dist
          path: release/qweovo-front-dist.zip

  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    permissions:
      contents: write

    steps:
      - name: Download backend artifact
        uses: actions/download-artifact@v4
        with:
          name: QWEOVOdetect-backend
          path: release

      - name: Download frontend artifact
        uses: actions/download-artifact@v4
        with:
          name: qweovo-front-dist
          path: release

      - name: Resolve release tag
        id: release_tag
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Create release and upload assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ steps.release_tag.outputs.tag }}
        run: |
          if gh release view "$RELEASE_TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release upload "$RELEASE_TAG" release/* --repo "$GITHUB_REPOSITORY" --clobber
          else
            gh release create "$RELEASE_TAG" release/* \
              --repo "$GITHUB_REPOSITORY" \
              --title "$RELEASE_TAG" \
              --notes "自动构建发布：后端 Spring Boot Jar 与前端 Vue dist 包。"
          fi

  dependency-submission:
    name: Submit dependency graph
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"

      - name: Generate and submit dependency graph
        uses: gradle/actions/dependency-submission@v4
